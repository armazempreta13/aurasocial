<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF3FF"/>
      <stop offset="1" stop-color="#FFF1FA"/>
    </linearGradient>
    <radialGradient id="glowTR" cx="0.86" cy="0.12" r="0.95">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCL" cx="0.22" cy="0.65" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glowTR)" opacity="0.28"/>
  <rect width="1200" height="1200" fill="url(#glowCL)" opacity="0.20"/>

  <!-- Soft wave -->
  <path d="M 0 740 C 220 660, 380 820, 620 740 C 860 660, 980 770, 1200 700" fill="none" stroke="#8B5CF6" stroke-opacity="0.14" stroke-width="2"/>

  <!-- Top-right arc with marker -->
  <g fill="none" stroke="#8B5CF6" stroke-opacity="0.18" stroke-width="2">
    <path d="M 760 64 A 376 376 0 0 1 1136 440" />
    <path d="M 800 88 A 356 356 0 0 1 1112 400" />
  </g>
  <circle cx="1082" cy="316" r="4" fill="#8B5CF6" fill-opacity="0.18"/>

  <!-- Dot grid (bottom-right) -->
  <g fill="#8B5CF6" fill-opacity="0.16">
    <circle cx="920" cy="920" r="2"/>
    <circle cx="950" cy="920" r="2"/>
    <circle cx="980" cy="920" r="2"/>
    <circle cx="1010" cy="920" r="2"/>
    <circle cx="1040" cy="920" r="2"/>

    <circle cx="920" cy="950" r="2"/>
    <circle cx="950" cy="950" r="2"/>
    <circle cx="980" cy="950" r="2"/>
    <circle cx="1010" cy="950" r="2"/>
    <circle cx="1040" cy="950" r="2"/>

    <circle cx="920" cy="980" r="2"/>
    <circle cx="950" cy="980" r="2"/>
    <circle cx="980" cy="980" r="2"/>
    <circle cx="1010" cy="980" r="2"/>
    <circle cx="1040" cy="980" r="2"/>
  </g>

  <!-- Center watermark -->
  <g opacity="0.08">
    <circle cx="600" cy="600" r="190" fill="#FFFFFF"/>
    <text x="600" y="675" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="260" font-weight="900" fill="#6D28D9">A</text>
