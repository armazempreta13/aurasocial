<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F3EEFF"/>
      <stop offset="1" stop-color="#EEF3FF"/>
    </linearGradient>
    <radialGradient id="glowTL" cx="0.18" cy="0.16" r="0.85">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBR" cx="0.85" cy="0.88" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glowTL)" opacity="0.35"/>
  <rect width="1200" height="1200" fill="url(#glowBR)" opacity="0.22"/>

  <!-- Corner arcs -->
  <g fill="none" stroke="#8B5CF6" stroke-opacity="0.18" stroke-width="2">
    <path d="M 64 420 A 356 356 0 0 1 420 64" />
    <path d="M 88 460 A 396 396 0 0 1 460 88" />
    <path d="M 112 500 A 436 436 0 0 1 500 112" />
  </g>

  <!-- Dot grid (top-left) -->
  <g fill="#8B5CF6" fill-opacity="0.18">
    <circle cx="120" cy="140" r="2"/>
    <circle cx="150" cy="140" r="2"/>
    <circle cx="180" cy="140" r="2"/>
    <circle cx="210" cy="140" r="2"/>
    <circle cx="240" cy="140" r="2"/>

    <circle cx="120" cy="170" r="2"/>
    <circle cx="150" cy="170" r="2"/>
    <circle cx="180" cy="170" r="2"/>
    <circle cx="210" cy="170" r="2"/>
    <circle cx="240" cy="170" r="2"/>

    <circle cx="120" cy="200" r="2"/>
    <circle cx="150" cy="200" r="2"/>
    <circle cx="180" cy="200" r="2"/>
    <circle cx="210" cy="200" r="2"/>
    <circle cx="240" cy="200" r="2"/>
  </g>

  <!-- Center watermark -->
  <g opacity="0.08">
    <circle cx="600" cy="600" r="190" fill="#FFFFFF"/>
    <text x="600" y="675" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="260" font-weight="900" fill="#6D28D9">A</text>
  </g>
</svg>

