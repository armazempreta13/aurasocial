<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF6EE"/>
      <stop offset="1" stop-color="#EEF3FF"/>
    </linearGradient>
    <radialGradient id="glowC" cx="0.55" cy="0.45" r="0.95">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBL" cx="0.16" cy="0.88" r="0.95">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glowC)" opacity="0.22"/>
  <rect width="1200" height="1200" fill="url(#glowBL)" opacity="0.18"/>

  <!-- Bottom-left arc -->
  <g fill="none" stroke="#8B5CF6" stroke-opacity="0.16" stroke-width="2">
    <path d="M 64 860 A 396 396 0 0 0 460 1136" />
    <path d="M 88 820 A 356 356 0 0 0 440 1112" />
  </g>
  <circle cx="286" cy="1024" r="4" fill="#8B5CF6" fill-opacity="0.16"/>

  <!-- Dot grid (top-right) -->
  <g fill="#8B5CF6" fill-opacity="0.14">
    <circle cx="930" cy="150" r="2"/>
    <circle cx="960" cy="150" r="2"/>
    <circle cx="990" cy="150" r="2"/>
    <circle cx="1020" cy="150" r="2"/>

    <circle cx="930" cy="180" r="2"/>
    <circle cx="960" cy="180" r="2"/>
    <circle cx="990" cy="180" r="2"/>
    <circle cx="1020" cy="180" r="2"/>

    <circle cx="930" cy="210" r="2"/>
    <circle cx="960" cy="210" r="2"/>
    <circle cx="990" cy="210" r="2"/>
    <circle cx="1020" cy="210" r="2"/>
  </g>

  <!-- Center watermark -->
  <g opacity="0.08">
    <circle cx="600" cy="600" r="190" fill="#FFFFFF"/>
    <text x="600" y="675" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="260" font-weight="900" fill="#6D28D9">A</text>
