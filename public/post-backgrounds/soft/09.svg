    <circle cx="210" cy="950" r="2"/>
    <circle cx="240" cy="950" r="2"/>
    <circle cx="270" cy="950" r="2"/>

    <circle cx="150" cy="980" r="2"/>
    <circle cx="180" cy="980" r="2"/>
    <circle cx="210" cy="980" r="2"/>
    <circle cx="240" cy="980" r="2"/>
    <circle cx="270" cy="980" r="2"/>
  </g>

  <!-- Center watermark -->
  <g opacity="0.08">
    <circle cx="600" cy="600" r="190" fill="#FFFFFF"/>
    <text x="600" y="675" text-anchor="middle" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial" font-size="260" font-weight="900" fill="#6D28D9">A</text>
