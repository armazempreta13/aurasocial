    <circle cx="150" cy="920" r="2"/>
    <circle cx="180" cy="920" r="2"/>
    <circle cx="210" cy="920" r="2"/>
    <circle cx="240" cy="920" r="2"/>
    <circle cx="270" cy="920" r="2"/>

    <circle cx="150" cy="950" r="2"/>
