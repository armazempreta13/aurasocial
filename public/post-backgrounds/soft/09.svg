<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EEF7FF"/>
      <stop offset="1" stop-color="#F3EEFF"/>
    </linearGradient>
    <radialGradient id="glowTL" cx="0.20" cy="0.18" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBR" cx="0.86" cy="0.86" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#glowTL)" opacity="0.26"/>
  <rect width="1200" height="1200" fill="url(#glowBR)" opacity="0.18"/>

  <!-- Top-right multi-arc -->
